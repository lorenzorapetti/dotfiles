[metadata]
name = "zellij-sessions"
description = "List and attach to zellij sessions"
requirements = ["zellij"]

[source]
command = "zellij list-sessions -n | sed -E 's/^([^ ]+) \\[Created ([0-9]+[a-z]+).* ago\\] \\(current\\).*/\\1 - \\2 ago (current)/; s/^([^ ]+) \\[Created ([0-9]+[a-z]+).* ago\\].*/\\1 - \\2 ago/'"

[keybindings]
enter = "actions:attach"

[actions.attach]
description = "Attach to (or switch to) a zellij session"
command = "sh -c 'if [ -n \"$ZELLIJ\" ]; then zellij action switch-session \"$1\"; else zellij attach \"$1\"; fi' _ '{split: :0}'"
mode = "execute"
