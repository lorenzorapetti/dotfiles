# vim:fileencoding=utf-8:foldmethod=marker

## name:     Catppuccin Kitty Mocha
## author:   Catppuccin Org
## license:  MIT
## upstream: https://github.com/catppuccin/kitty/blob/main/themes/mocha.conf
## blurb:    Soothing pastel theme for the high-spirited!



# The basic colors
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

# Cursor colors
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

# Scrollbar colors
scrollbar_handle_color  #9399b2
scrollbar_track_color   #45475a

# URL color when hovering with mouse
url_color               #f5e0dc

# Kitty window border colors
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# Colors for marks (marked text in the terminal)
mark1_foreground #1e1e2e
mark1_background #b4befe
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

# The 16 terminal colors

# black
color0 #45475a
color8 #585b70

# red
color1 #f38ba8
color9 #f38ba8

# green
color2  #a6e3a1
color10 #a6e3a1

# yellow
color3  #f9e2af
color11 #f9e2af

# blue
color4  #89b4fa
color12 #89b4fa

# magenta
color5  #f5c2e7
color13 #f5c2e7

# cyan
color6  #94e2d5
color14 #94e2d5

# white
color7  #bac2de
color15 #a6adc8

font_family GeistMono Nerd Font Mono
font_size 11.0

cursor_shape block

scrollback_pager nvim --cmd 'set eventignore=FileType' +'nnoremap q ZQ' +'call nvim_open_term(0, {})' +'set nomodified nolist' +'$' -
scrollback_pager_history_size 5

mouse_hide_wait 3.0
show_hyperlink_targets yes

enable_audio_bell yes
visual_bell_duration 1.0
bell_on_tab " "

hide_window_decorations yes

tab_bar_edge top
tab_bar_style fade
tab_fade 1
tab_activity_symbol " "
tab_title_max_length 30

# background_opacity 0.95
background_blur 8
# transparent_background_colors #1e1e2e@0.95 #1E1E2F@0.95 #282431@0.95
notify_on_cmd_finish unfocused
macos_option_as_alt left
macos_quit_when_last_window_closed yes

allow_remote_control yes
listen_on unix:@mykitty

enabled_layouts tall:bias=60,stack,horizontal,vertical

#: Keyboard shortcuts {{{

#: Keys are identified simply by their lowercase Unicode characters.
#: For example: a for the A key, [ for the left square bracket key,
#: etc. For functional keys, such as Enter or Escape, the names are
#: present at Functional key definitions
#: <https://sw.kovidgoyal.net/kitty/keyboard-protocol/#functional>.
#: For modifier keys, the names are ctrl (control, ⌃), shift (⇧), alt
#: (opt, option, ⌥), super (cmd, command, ⌘).

#: Simple shortcut mapping is done with the map directive. For full
#: details on advanced mapping including modal and per application
#: maps, see mapping <https://sw.kovidgoyal.net/kitty/mapping/>. Some
#: quick examples to illustrate common tasks::

#:     # unmap a keyboard shortcut, passing it to the program running in kitty
#:     map kitty_mod+space
#:     # completely ignore a keyboard event
#:     map ctrl+alt+f1 discard_event
#:     # combine multiple actions
#:     map kitty_mod+e combine : new_window : next_layout
#:     # multi-key shortcuts
#:     map ctrl+x>ctrl+y>z action

#: You can browse and trigger these actions by pressing
#: command_palette to run the command palette. The full list of
#: actions that can be mapped to key presses is available here
#: <https://sw.kovidgoyal.net/kitty/actions/>.

clear_all_shortcuts yes

kitty_mod ctrl+shift

# map_timeout 0.0

#: The default timeout (in seconds) for multi-key mappings and modal
#: keyboard modes. If you press the first key(s) of a multi-key
#: mapping and don't press the next key within this timeout, the
#: mapping is cancelled and the mode is exited. A value of zero
#: disables the timeout. This can be overridden for specific modes
#: using the --timeout option when creating a keyboard mode with
#: --new-mode. For example::

#:     # 2 second timeout for all mappings
#:     map_timeout 2.0

#:     # This mode will have a 5 second timeout (overrides the global 2 second timeout)
#:     map --new-mode resize --timeout 5.0 kitty_mod+r

#: Clipboard
map kitty_mod+c copy_to_clipboard
map ctrl+c      copy_and_clear_or_interrupt
map kitty_mod+v paste_from_clipboard

#: Scrolling
map kitty_mod+up        scroll_line_up
map kitty_mod+down      scroll_line_down
map kitty_mod+page_up   scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home      scroll_home
map kitty_mod+end       scroll_end

#: Show scrollback in pager
map kitty_mod+/ show_scrollback

#: Browse output of the last shell command in pager
map kitty_mod+g show_last_command_output

#: Tab Management
map kitty_mod+]     next_tab
map ctrl+t>l        next_tab
map kitty_mod+[     previous_tab
map ctrl+t>h        previous_tab
map kitty_mod+t     new_tab
map ctrl+t>n        new_tab
map kitty_mod+w     close_tab
map ctrl+t>w        close_tab
map kitty_mod+.     move_tab_forward
map kitty_mod+,     move_tab_backward
map ctrl+t>r        set_tab_title

#: Window Management
map kitty_mod+enter new_window_with_cwd
map kitty_mod+q     close_window
map kitty_mod+f8    swap_with_window
map kitty_mod+r     start_resizing_window
map kitty_mod+d      focus_visible_window

map ctrl+j kitten pass_keys.py neighboring_window bottom ctrl+j
map ctrl+k kitten pass_keys.py neighboring_window top    ctrl+k
map ctrl+h kitten pass_keys.py neighboring_window left   ctrl+h
map ctrl+l kitten pass_keys.py neighboring_window right  ctrl+l

#: Next layout
map kitty_mod+l>n next_layout
map kitty_mod+l>s goto_layout stack
map kitty_mod+l>h goto_layout horizontal
map kitty_mod+l>v goto_layout vertical
map kitty_mod+l>t goto_layout tall

#: Font Size
map kitty_mod+equal     change_font_size all +2.0
map kitty_mod+minus     change_font_size all -2.0
map kitty_mod+backspace change_font_size all 0

#: Open URL
map kitty_mod+p>x open_url_with_hints

#: Insert selected path
map kitty_mod+p>f kitten hints --type path --program -

#: Open selected path
map kitty_mod+p>shift+f kitten hints --type path

#: Insert chosen file
map kitty_mod+p>c kitten choose-files

#: Insert chosen directory
map kitty_mod+p>d kitten choose-files --mode=dir

#: Insert selected line
map kitty_mod+p>l kitten hints --type line --program -

#: Insert selected word
map kitty_mod+p>w kitten hints --type word --program -

#: Insert selected hash
map kitty_mod+p>h kitten hints --type hash --program -

#: Miscellaneous {{{

#: Show documentation
map kitty_mod+f1 show_kitty_doc overview

#: Command palette
map kitty_mod+alt+p command_palette

#: Toggle fullscreen
map kitty_mod+f11 toggle_fullscreen

#: Toggle maximized
map kitty_mod+f10 toggle_maximized

#: Unicode input
map kitty_mod+u    kitten unicode_input

#: Open the kitty command shell
map kitty_mod+escape kitty_shell window

#: Reload kitty.conf
map kitty_mod+f5 load_config_file

#: Debug kitty configuration
map kitty_mod+f6 debug_config
