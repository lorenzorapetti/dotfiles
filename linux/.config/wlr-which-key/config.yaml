font: GeistMono Nerd Font Mono 12
background: "#1e1e2e"
color: "#ffffff"
border: "#b4befe"
padding: 12
border_width: 2
corner_r: 8

anchor: center

menu:
  - key: "p"
    desc: Power
    submenu:
      - key: "s"
        desc: Sleep
        cmd: systemctl suspend
      - key: "r"
        desc: Reboot
        cmd: reboot
      - key: "o"
        desc: Off
        cmd: shutdown now
  - key: "a"
    desc: Apps
    submenu:
      - key: "h"
        desc: Helium
        cmd: helium-browser
      - key: "f"
        desc: Firefox
        cmd: firefox
      - key: "t"
        desc: Telegram
        cmd: Telegram
      - key: "d"
        desc: Discord
        cmd: vesktop
  - key: "e"
    desc: Execute
    submenu:
      - key: "w"
        desc: Emoji Selector
        cmd: vicinae vicinae://extensions/vicinae/core/search-emojis
      - key: "e"
        desc: File Manager
        cmd: ghostty --class=com.ghostty.quick_terminal -e yazi
      - key: "p"
        desc: Task Manager
        cmd: ghostty --class=com.ghostty.quick_terminal -e btop
      - key: "b"
        desc: Bluetooth
        cmd: ghostty --class=com.ghostty.quick_terminal -e bluetuith
      - key: "v"
        desc: Volume
        cmd: ghostty --class=com.ghostty.quick_terminal -e wiremix
  - key: "s"
    desc: Screenshot
    submenu:
      - key: "f"
        desc: Full Screen
        cmd: screenshot fullscreen
      - key: "r"
        desc: Region
        cmd: screenshot region
      - key: "w"
        desc: Windows
        cmd: screenshot windows
      - key: "s"
        desc: Smart
        cmd: screenshot smart
