enable_esc_key = true

[modules]
left = [ "Workspaces", "KeyboardSubmap", "Tray", "MediaPlayer" ]
center = [ "WindowTitle" ]
right = [ [ "SystemInfo", "Updates" ], [ "Tempo", "Privacy", "Settings" ] ]

[media_player]
max_title_length = 50

[settings]
lock_cmd = "hyprlock &"
audio_sinks_more_cmd = "pavucontrol -t 3"
audio_sources_more_cmd = "pavucontrol -t 4"
wifi_more_cmd = "nm-connection-editor"
vpn_more_cmd = "nm-connection-editor"
bluetooth_more_cmd = "blueman-manager"
brightness_indicator_format = "IconAndPercentage"
audio_indicator_format = "IconAndPercentage"
indicators = ["IdleInhibitor", "PowerProfile", "Bluetooth", "Network", "Vpn", "Microphone", "Audio", "Brightness", "Battery"]

[tempo]
weather_location = { City = "Latina" }
timezones = [
  "Europe/Rome",
  "Europe/London",
  "UTC"
]

[updates]
check_cmd = "checkupdates; paru -Qua"
update_cmd = 'ghostty --class=com.ghostty.quick_terminal -e "paru; echo Done - Press enter to exit; read" &'
interval = 3600

[window_title]
truncate_title_after_length = 75

[workspaces]
enable_workspace_filling = true
max_workspaces = 10
workspace_names = ["一","二","三","四","五","六","七","八","九","十"]

[appearance]
font_name = "GeistMono Nerd Font Mono"
success_color = "#a6e3a1"
text_color = "#cdd6f4"

workspace_colors = [ "#b4befe", "#74c7ec" ]

[appearance.primary_color]
base = "#fab387"
text = "#1e1e2e"

[appearance.danger_color]
base = "#f38ba8"
weak = "#f9e2af"

[appearance.background_color]
base = "#1e1e2e"
weak = "#313244"
strong = "#45475a"

[appearance.secondary_color]
base = "#11111b"
strong = "#1b1b25"
