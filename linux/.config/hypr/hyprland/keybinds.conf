binds {
  workspace_back_and_forth = true
  hide_special_on_workspace_change = true
  workspace_center_on = 1
}

$browser = helium-browser
$terminal = ghostty
$fileManager = nautilus

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# https://wiki.hypr.land/Configuring/Binds/

# ------------------- Programs -------------------
bindd = $mainMod, Return, Open Terminal, exec, $terminal
bindd = $mainMod, B, Open Browser, exec, $browser
bindd = $mainMod, E, Open Terminal File Manager, exec, ghostty --class=com.ghostty.quick_terminal -e yazi
bindd = $mainMod, D, Open Bluetooth, exec, ghostty --class=com.ghostty.quick_terminal -e bluetuith
bindd = $mainMod, V, Open Volume Control, exec, ghostty --class=com.ghostty.quick_terminal -e wiremix
bindd = $mainMod SHIFT, E, Open File Manager, exec, nautilus

# Launchers
bindd = $mainMod, Space, Toggle Launcher, exec, vicinae toggle
bindd = $mainMod SHIFT, Space, Toggle 1Password, exec, 1password --quick-access
bindd = $mainMod, Y, Toggle Clipboard History, exec, vicinae vicinae://extensions/vicinae/clipboard/history
bindd = $mainMod, O, Which Key, exec, wlr-which-key

bindd = $mainMod, Escape, Lock Screen, exec, hyprlock
bindd = $mainMod SHIFT, Escape, Exit Hyprland, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# ------------------- Screenshot -------------------
bindd = , Print, Screenshot of region, exec, screenshot region
bindd = SHIFT, PRINT, Screenshot of window, exec, screenshot window
bindd = CTRL, PRINT, Screenshot of display, exec, screenshot output

# ------------------- Apps -------------------
bindd = $mainMod, A, Apps Submap, submap, apps

submap = apps

bindd = , E, Open Emoji Selector, exec, vicinae vicinae://extensions/vicinae/core/search-emojis && hyprctl dispatch submap reset
bindd = , B, Open Browser, exec, $browser && hyprctl dispatch submap reset
bindd = , T, Open Telegram, exec, telegram-desktop && hyprctl dispatch submap reset
bindd = , D, Open Discord, exec, vesktop && hyprctl dispatch submap reset
bindd = , escape, Exit Apps Submap, submap, reset
bindd = , caps_lock, Exit Submap, submap, reset

submap = reset

# ------------------- Layout -------------------
# bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# ------------------- Windows -------------------
bindd = $mainMod, Q, Close Current Window, killactive,
bindd = $mainMod, F, Toggle Floating, togglefloating,
bindd = $mainMod, M, Maximise Window, fullscreen, 1
bindd = $mainMod, P, Pin Window, exec, hypr-float-and-pin
bindd = $mainMod, Tab, Focus Current or Last Window, focuscurrentorlast

bindd = $mainMod, left, Focus Left Window, movefocus, l
bindd = $mainMod, right, Focus Right Window, movefocus, r
bindd = $mainMod, up, Focus Above Window, movefocus, u
bindd = $mainMod, down, Focus Below Window, movefocus, d
bindd = $mainMod, h, Focus Left Window, movefocus, l
bindd = $mainMod, l, Focus Right Window, movefocus, r
bindd = $mainMod, k, Focus Above Window, movefocus, u
bindd = $mainMod, j, Focus Below Window, movefocus, d

bindd = $mainMod SHIFT, left, Move Window Left, movewindow, l
bindd = $mainMod SHIFT, right, Move Window Right, movewindow, r
bindd = $mainMod SHIFT, up, Move Window Up, movewindow, u
bindd = $mainMod SHIFT, down, Move Window Down, movewindow, d
bindd = $mainMod SHIFT, h, Move Window Left, movewindow, l
bindd = $mainMod SHIFT, l, Move Window Right, movewindow, r
bindd = $mainMod SHIFT, k, Move Window Up, movewindow, u
bindd = $mainMod SHIFT, j, Move Window Down, movewindow, d

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = $mainMod, mouse:272, Move Window, movewindow
bindmd = $mainMod, mouse:273, Resize Window, resizewindow

bindd = $mainMod, R, Resize Submap, submap, resize

submap = resize

bindd = , c, Resize Column, layoutmsg, colresize +conf
bindd = , left, Resize Left, resizeactive, -20 0
bindd = , right, Resize Right, resizeactive, 20 0
bindd = , up, Resize Up, resizeactive, 0 -20
bindd = , down, Resize Down, resizeactive, 0 20
bindd = , h, Resize Left, resizeactive, -20 0
bindd = , l, Resize Right, resizeactive, 20 0
bindd = , k, Resize Up, resizeactive, 0 -20
bindd = , j, Resize Down, resizeactive, 0 20
bindd = , escape, Exit Submap, submap, reset
bindd = , caps_lock, Exit Submap, submap, reset

submap = reset

# ------------------- Groups -------------------
bindd = $mainMod SHIFT, G, Toggle Window into Group, togglegroup
bindd = $mainMod, G, Change Active Window in Group, changegroupactive, f
bindd = $mainMod CTRL, G, Move Window out of Group, moveoutofgroup

bindd = $mainMod SHIFT CTRL, left, Move Window into Left Group, moveintogroup, l
bindd = $mainMod SHIFT CTRL, right, Move Window into Right Group, moveintogroup, r
bindd = $mainMod SHIFT CTRL, up, Move Window into Above Group, moveintogroup, u
bindd = $mainMod SHIFT CTRL, down, Move Window into Below Group, moveintogroup, d
bindd = $mainMod SHIFT CTRL, h, Move Window into Left Group, moveintogroup, l
bindd = $mainMod SHIFT CTRL, l, Move Window into Right Group, moveintogroup, r
bindd = $mainMod SHIFT CTRL, k, Move Window into Above Group, moveintogroup, u
bindd = $mainMod SHIFT CTRL, j, Move Window into Below Group, moveintogroup, d

# ------------------- Monitors -------------------
bindd = $mainMod, Dot, Focus Next Monitor, focusmonitor, +1
bindd = $mainMod, Comma, Focus Previous Monitor, focusmonitor, -1

bindd = $mainMod SHIFT, Dot, Move Window to Next Monitor, movewindow, mon:+1
bindd = $mainMod SHIFT, Comma, Move Window to Previous Monitor, movewindow, mon:-1

bindd = $mainMod CTRL, Dot, Move Workspace to Next Monitor, movecurrentworkspacetomonitor, +1
bindd = $mainMod CTRL, Comma, Move Workspace to Previous Monitor, movecurrentworkspacetomonitor, -1

# ------------------- Workspaces -------------------
bindd = $mainMod, 1, Focus Workspace 1, workspace, 1
bindd = $mainMod, 2, Focus Workspace 2, workspace, 2
bindd = $mainMod, 3, Focus Workspace 3, workspace, 3
bindd = $mainMod, 4, Focus Workspace 4, workspace, 4
bindd = $mainMod, 5, Focus Workspace 5, workspace, 5
bindd = $mainMod, 6, Focus Workspace 6, workspace, 6
bindd = $mainMod, 7, Focus Workspace 7, workspace, 7
bindd = $mainMod, 8, Focus Workspace 8, workspace, 8
bindd = $mainMod, 9, Focus Workspace 9, workspace, 9
bindd = $mainMod, 0, Focus Workspace 10, workspace, 10

bindd = $mainMod SHIFT, 1, Move Window to Workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move Window to Workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move Window to Workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move Window to Workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move Window to Workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move Window to Workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move Window to Workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move Window to Workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move Window to Workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move Window to Workspace 10, movetoworkspace, 10

# Special workspace (scratchpad)
bindd = $mainMod, S, Toggle Special Workspace, togglespecialworkspace, magic
bindd = $mainMod SHIFT, S, Move Window to Special Workspace, movetoworkspace, special:magic

# ------------------- Notifications -------------------

bindd = $mainMod, N, Notifications Submap, submap, notifications

submap = notifications

bindd = , A, Notifications Actions, exec, dunstctl context && hyprctl dispatch submap reset
bindd = , C, Close Topmost Notification, exec, dunstctl close && hyprctl dispatch submap reset
bindd = , Q, Close All Notifications, exec, dunstctl close-all && hyprctl dispatch submap reset
bindd = , H, Notification History, exec, dunstctl history && hyprctl dispatch submap reset
bindd = , escape, Exit Submap, submap, reset
bindd = , caps_lock, Exit Submap, submap, reset

submap = reset

# ------------------- Media -------------------

# Laptop multimedia keys for volume and LCD brightness
bindeld = ,XF86AudioRaiseVolume, Raise Volume, exec, wp-volume 5%+
bindeld = ,XF86AudioLowerVolume, Lower Volume, exec, wp-volume 5%-
bindeld = ,XF86AudioMute, Mute, exec, wp-volume toggle-mute
bindeld = ,XF86AudioMicMute, Mute Mic, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindeld = ,XF86MonBrightnessUp, Brightness Up, exec, brightnessctl -e4 -n2 set 5%+
bindeld = ,XF86MonBrightnessDown, Brightness Down, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindld = , XF86AudioNext, Next, exec, playerctl next
bindld = , XF86AudioPause, Pause, exec, playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, playerctl play-pause
bindld = , XF86AudioPrev, Previous, exec, playerctl previous
