# vim: ft=hyprlang

$hypr = ~/.config/hypr/hyprland

source = $hypr/themes/mocha.conf
source = $hypr/monitors.conf
source = $hypr/autostart.conf
source = $hypr/environment.conf
source = $hypr/keybinds.conf
source = $hypr/rules.conf
source = $hypr/input.conf

ecosystem {
  no_donation_nag = true
  #  enforce_permissions = 1
}

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 6
    gaps_out = 10
    float_gaps = 10

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = $lavender $blue 45deg
    col.inactive_border = rgba($overlay0Alphaaa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = scrolling
}

# scrolling {
#   wrap_focus = false
# }

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 8
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,                ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,              1,     10,    default
    animation = border,              1,     5.39,  easeOutQuint
    animation = windows,             1,     4.79,  easeOutQuint
    animation = windowsIn,           1,     3.1,   easeOutQuint, popin 87%
    animation = windowsOut,          1,     1.49,  linear,       popin 87%
    animation = fadeIn,              1,     1.73,  almostLinear
    animation = fadeOut,             1,     1.46,  almostLinear
    animation = fade,                1,     3.03,  quick
    animation = layers,              1,     3.81,  easeOutQuint
    animation = layersIn,            1,     4,     easeOutQuint, fade
    animation = layersOut,           1,     1.5,   linear,       fade
    animation = fadeLayersIn,        1,     1.79,  almostLinear
    animation = fadeLayersOut,       1,     1.39,  almostLinear
    animation = workspaces,          1,     1.94,  easeOutQuint, slidefadevert 5%
    animation = workspacesIn,        1,     1.21,  easeOutQuint, slidefadevert 5%
    animation = workspacesOut,       1,     1.94,  easeOutQuint, slidefadevert 5%
    animation = specialWorkspace,    1,     1.94,  easeOutQuint, fade
    animation = specialWorkspaceIn,  1,     1.21,  easeOutQuint, fade
    animation = specialWorkspaceOut, 1,     1.94,  easeOutQuint, fade
    animation = zoomFactor,          1,     7,     quick
}

group {
  col.border_active = $lavender
  col.border_inactive = rgba($overlay0Alphaaa)
  col.border_locked_active = $maroon
  col.border_locked_inactive = rgba($overlay0Alphaaa)

  groupbar {
    font_size = 10
    gradients = true
    gradient_round_only_edges = false
    gradient_rounding = 10
    height = 25
    indicator_height = 0
    gaps_in = 3
    gaps_out = 3

    text_color = $crust
    col.active = $lavender
    col.inactive = rgba($overlay0Alphaaa)
    col.locked_active = $lavender
    col.locked_inactive = rgba($overlay0Alphaaa)
  }
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
  vrr = true
  vfr = 1
  force_default_wallpaper = 0
  disable_hyprland_logo = true
  font_family = GeistMono Nerd Font Mono
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
  focus_on_activate = true
  middle_click_paste = false
  background_color = rgba($overlay0Alphaaa)
}

xwayland {
  force_zero_scaling = true
}


