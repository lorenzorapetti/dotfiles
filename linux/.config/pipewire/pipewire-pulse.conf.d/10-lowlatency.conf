# Drop-in merged OVER /usr/share/pipewire/pipewire-pulse.conf (keeps all defaults).
# Lower the buffer floor that PulseAudio-API clients (most games) may negotiate.
# 256/48000 = ~5.3 ms, down from the 1024/48000 (~22 ms) default. Bump to
# 512/48000 if you hear crackle under load.
pulse.properties = {
  pulse.min.quantum = 256/48000
}
