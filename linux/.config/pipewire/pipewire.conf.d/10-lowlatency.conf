# PipeWire tweaks as a drop-in (merged OVER /usr/share/pipewire/pipewire.conf,
# so all the system modules stay loaded). Never replace the whole pipewire.conf.
context.properties = {
  # Allow the DAC's native sample rates instead of always resampling to 48k.
  default.clock.allowed-rates = [ 44100 88200 176400 48000 96000 192000 ]
  # Lower the graph quantum floor for native ALSA/JACK clients. Only lowers the
  # floor; PipeWire negotiates up when a client asks for a bigger buffer, so this
  # is safe and won't force tiny buffers everywhere.
  default.clock.min-quantum = 256
}
