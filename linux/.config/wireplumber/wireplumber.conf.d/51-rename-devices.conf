# Friendly names for audio devices.
#
# This is a WirePlumber 0.5.x drop-in: files in wireplumber.conf.d/ are merged
# over the built-in 50-* defaults, so we only override node.description/node.nick.
# Devices are matched by their stable node.name (derived from USB/PCI IDs).
#
# To revert: delete this file and run `systemctl --user restart wireplumber`.

monitor.alsa.rules = [
  # --- Sinks (outputs) ---
  {
    matches = [ { node.name = "alsa_output.usb-Schiit_Audio_Schiit_Modi_3_-00.analog-stereo" } ]
    actions = {
      update-props = {
        node.description = "Schiit DAC"
        node.nick        = "Schiit DAC"
      }
    }
  }
  {
    matches = [ { node.name = "alsa_output.usb-Logitech_PRO_X_Wireless_Gaming_Headset-00.analog-stereo" } ]
    actions = {
      update-props = {
        node.description = "Logitech G PRO X Headset"
        node.nick        = "Logitech G PRO X Headset"
      }
    }
  }
  {
    matches = [ { node.name = "alsa_output.pci-0000_65_00.6.analog-stereo" } ]
    actions = {
      update-props = {
        node.description = "Motherboard Out"
        node.nick        = "Motherboard Out"
      }
    }
  }
  {
    matches = [ { node.name = "alsa_output.pci-0000_65_00.1.hdmi-stereo-extra1" } ]
    actions = {
      update-props = {
        node.description = "Monitor (HDMI)"
        node.nick        = "Monitor (HDMI)"
      }
    }
  }

  # --- Sources (inputs) ---
  {
    matches = [ { node.name = "alsa_input.usb-Insta360_Insta360_Link_2C-02.mono-fallback" } ]
    actions = {
      update-props = {
        node.description = "Webcam Mic"
        node.nick        = "Webcam Mic"
      }
    }
  }
  {
    matches = [ { node.name = "alsa_input.usb-Logitech_PRO_X_Wireless_Gaming_Headset-00.mono-fallback" } ]
    actions = {
      update-props = {
        node.description = "Logitech G PRO X Headset Mic"
        node.nick        = "Logitech G PRO X Headset Mic"
      }
    }
  }
  {
    matches = [ { node.name = "alsa_input.pci-0000_65_00.6.analog-stereo" } ]
    actions = {
      update-props = {
        node.description = "Motherboard Mic"
        node.nick        = "Motherboard Mic"
      }
    }
  }
]
