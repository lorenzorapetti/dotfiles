# Bluetooth tuning, mainly for AirPods.
#
# WirePlumber 0.5.x drop-in: merged over the built-in 50-* defaults.
# To revert: delete this file and run `systemctl --user restart wireplumber`.

wireplumber.settings = {
  # Stay in high-quality A2DP for playback; do NOT auto-drop to the muffled HFP
  # headset profile when an app opens the mic. The headset profile is still
  # available to switch to manually when you actually need the mic.
  bluetooth.autoswitch-to-headset-profile = false
}

monitor.bluez.properties = {
  # Prefer AAC (AirPods' native codec), then SBC-XQ, then SBC.
  bluez5.codecs        = [ aac sbc_xq sbc ]
  bluez5.enable-sbc-xq = true
}
