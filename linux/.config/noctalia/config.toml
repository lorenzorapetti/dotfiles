[bar.default]
background_opacity = 0.84999999999999998
center = [ "taskbar" ]
end = [ "group:g2", "group:g3", "volume", "battery", "group:g1", "session" ]
margin_edge = 0
margin_ends = 0
radius = 0
shadow = false
start = [ "clock", "weather", "tray", "active_window", "privacy" ]
thickness = 40
widget_spacing = 14

    [[bar.default.capsule_group]]
    fill = "surface_variant"
    id = "g2"
    members = [ "network_rx", "cpu", "network_tx", "ram" ]
    opacity = 0.0
    padding = 0.0

    [[bar.default.capsule_group]]
    fill = "surface_variant"
    id = "g3"
    members = [ "network", "bluetooth" ]
    opacity = 0.0
    padding = 20.0

    [[bar.default.capsule_group]]
    fill = "surface_variant"
    id = "g1"
    members = [ "notifications", "screenshot", "recorder", "wallpaper", "caffeine", "control-center" ]
    opacity = 0.0
    padding = 20.0

[calendar]
enabled = true

    [calendar.account.nebulab]
    color = "on_surface_variant"
    name = "Nebulab"
    type = "google"

    [calendar.account.personal_google]
    color = "tertiary"
    name = "Home"
    type = "google"

[desktop_widgets]
enabled = false

[dock]
auto_hide = true
enabled = true
icon_size = 36
reserve_space = false

[idle]
behavior_order = [ "Reduce Brightness", "Keyboard Brightness", "lock", "screen-off", "lock-and-suspend" ]
pre_action_fade_seconds = 0

    [idle.behavior."Keyboard Brightness"]
    action = "command"
    command = "kbd_backlight 0"
    enabled = true
    timeout = 180

    [idle.behavior."Reduce Brightness"]
    action = "command"
    command = "brightnessctl -s set 10"
    enabled = true
    resume_command = "brightnessctl -r"
    timeout = 180

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 300

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 600

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 400

[location]
address = "Latina, Italia"

[lockscreen]
blurred_desktop = true
fingerprint = false

[lockscreen_widgets]
enabled = false
schema_version = 2

[osd.kinds]
bluetooth = false
keyboard_layout = false
media = false
wifi = false

[plugin_settings."noctalia/screen_recorder"]
color_range = "full"
copy_to_clipboard = true

[plugins]
enabled = [ "noctalia/bongocat", "noctalia/screen_recorder" ]

[shell]
clipboard_enabled = false
font_family = "GeistMono NF"
launch_apps_as_systemd_services = true
polkit_agent = true
settings_show_advanced = true

    [shell.panel]
    session_placement = "centered"
    wallpaper_placement = "floating"

    [shell.screenshot]
    copy_to_clipboard = false
    directory = "~/Pictures/Screenshots"
    pipe_command = "satty -f -"
    pipe_to_command = true
    save_to_file = false

    [[shell.session.actions]]
    action = "lock"
    enabled = true
    shortcut = "l"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "x"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    enabled = true
    shortcut = "u"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    command = "hyprshutdown -t 'Restarting...' --post-cmd 'reboot'"
    enabled = true
    shortcut = "r"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    command = "hyprshutdown -t 'Shutting down...' --post-cmd 'shutdown -P 0'"
    enabled = true
    shortcut = "s"
    variant = "destructive"

    [shell.shadow]
    alpha = 0.19999999552965164

[theme]
builtin = "Catppuccin"
community_palette = "Oxocarbon"
mode = "dark"
source = "builtin"
wallpaper_scheme = "m3-content"

    [theme.templates]
    enable_builtin_templates = false
    enable_community_templates = false

[wallpaper]
directory = "~/Pictures/Wallpapers"

    [wallpaper.automation]
    enabled = true
    interval_seconds = 36000

    [[wallpaper.favorite]]
    path = "/home/lorenzo/Pictures/Wallpapers/1123121.png"
    theme_mode = "auto"

    [[wallpaper.favorite]]
    builtin_palette = "Catppuccin"
    palette_source = "builtin"
    path = "/home/lorenzo/Pictures/Wallpapers/2897748.jpg"
    theme_mode = "dark"

    [[wallpaper.favorite]]
    builtin_palette = "Catppuccin"
    palette_source = "builtin"
    path = "/home/lorenzo/Pictures/Wallpapers/1348042.jpg"
    theme_mode = "dark"

[widget.active_window]
max_length = 180
title_scroll = "on_hover"

[widget.battery]
display_mode = "graphic"

[widget.clock]
format = "%a %e %b %H:%M"

[widget.cpu]
show_label = false

[widget.media]
hide_when_no_media = true
max_length = 180
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.network_rx]
show_label = false

[widget.network_tx]
show_label = false

[widget.privacy]
capsule = true
capsule_opacity = 0.0
capsule_padding = 20.0
hide_inactive = true

[widget.ram]
show_label = false
stat = "ram_pct"

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.taskbar]
empty_color = "primary"
focused_color = "tertiary"
group_by_workspace = true
group_single_icon_per_app = true
occupied_color = "primary"
show_active_indicator = false
workspace_label_placement = "inside"

[widget.tray]
capsule = true
capsule_opacity = 0.0
capsule_padding = 20.0

[widget.weather]
show_condition = false

[widget.workspaces]
active_pill_size = 2.0
display = "name"
empty_color = "primary"
focused_color = "tertiary"
hide_when_empty = true
occupied_color = "primary"
