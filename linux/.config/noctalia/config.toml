[bar.default]
background_opacity = 0.85
center = [ "workspaces" ]
end = [
    "cpu",
    "network_rx",
    "network_tx",
    "ram",
    "bluetooth",
    "network",
    "volume",
    "notifications",
    "battery",
    "screenshot",
    "recorder",
    "control-center",
    "session"
]
margin_edge = 0
margin_ends = 0
radius = 0
shadow = false
start = [ "clock", "weather", "tray", "active_window", "media" ]
thickness = 40
widget_spacing = 14

[calendar]
enabled = true

[desktop_widgets]
enabled = false

[dock]
auto_hide = true
enabled = true
icon_size = 36
reserve_space = false

[idle]
behavior_order = [ "Reduce Brightness", "Keyboard Brightness", "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior."Keyboard Brightness"]
    action = "command"
    command = "kbd_backlight 0"
    enabled = true
    timeout = 180

    [idle.behavior."Reduce Brightness"]
    action = "command"
    command = "brightnessctl -s set 10"
    enabled = true
    timeout = 180

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 300

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 600

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 400

[location]
address = "Latina, Italia"

[lockscreen]
blurred_desktop = true
fingerprint = false

[lockscreen_widgets]
enabled = false
schema_version = 2

[osd.kinds]
bluetooth = false
keyboard_layout = false
media = false
wifi = false

[plugin_settings."noctalia/screen_recorder"]
copy_to_clipboard = true

[plugins]
enabled = [ "noctalia/bongocat", "noctalia/screen_recorder" ]

[shell]
clipboard_enabled = false
font_family = "GeistMono NF"
launch_apps_as_systemd_services = true
polkit_agent = true
settings_show_advanced = true

    [shell.panel]
    session_placement = "centered"
    wallpaper_placement = "floating"

    [[shell.session.actions]]
    action = "lock"
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    enabled = true
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    command = "hyprshutdown -t 'Restarting...' --post-cmd 'reboot'"
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    command = "hyprshutdown -t 'Shutting down...' --post-cmd 'shutdown -P 0'"
    enabled = true
    shortcut = "5"
    variant = "destructive"

    [shell.shadow]
    alpha = 0.20000000000000001

[theme]
builtin = "Catppuccin"

    [theme.templates]
    enable_builtin_templates = false
    enable_community_templates = false

[wallpaper]
directory = "~/Pictures/Wallpapers"

    [wallpaper.automation]
    enabled = true

[widget.active_window]
max_length = 180
title_scroll = "on_hover"

[widget.battery]
display_mode = "graphic"

[widget.cat]
type = "noctalia/bongocat:cat"

[widget.clock]
format = "%a %e %b %H:%M"

[widget.cpu]
show_label = false

[widget.media]
hide_when_no_media = true
max_length = 180
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.network_rx]
show_label = false

[widget.network_tx]
show_label = false

[widget.ram]
show_label = false
stat = "ram_pct"

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.weather]
show_condition = false

[widget.workspaces]
display = "name"
empty_color = "primary"
focused_color = "tertiary"
hide_when_empty = true
occupied_color = "primary"
